<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板块关系图谱 - V0.2</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🔗 板块关系图谱</h1>
            <p class="subtitle">A股板块轮动分析系统 - V0.2 数据管理</p>
        </header>

        <!-- Tab切换 -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="graph">📊 图谱视图</button>
            <button class="tab-btn" data-tab="sectors">📋 板块管理</button>
            <button class="tab-btn" data-tab="relations">🔗 关联管理</button>
        </nav>

        <!-- 图谱视图 -->
        <main id="tab-graph" class="tab-content active">
            <div id="graph-container"></div>
            <aside class="info-panel">
                <h2>📊 板块信息</h2>
                <div id="sector-info">
                    <p class="placeholder">点击节点查看详情</p>
                </div>
                <h2>📈 今日涨跌</h2>
                <div id="sector-list"></div>
            </aside>
        </main>

        <!-- 板块管理 -->
        <section id="tab-sectors" class="tab-content">
            <div class="management-panel">
                <div class="panel-header">
                    <h2>板块管理</h2>
                    <button class="btn btn-primary" onclick="showSectorForm()">+ 添加板块</button>
                </div>
                <table class="data-table" id="sectors-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名称</th>
                            <th>层级</th>
                            <th>体量</th>
                            <th>日涨跌</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- 关联管理 -->
        <section id="tab-relations" class="tab-content">
            <div class="management-panel">
                <div class="panel-header">
                    <h2>关联管理</h2>
                    <button class="btn btn-primary" onclick="showRelationForm()">+ 添加关联</button>
                </div>
                <table class="data-table" id="relations-table">
                    <thead>
                        <tr>
                            <th>源板块</th>
                            <th>目标板块</th>
                            <th>关系类型</th>
                            <th>权重</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- 板块表单弹窗 -->
        <div class="modal" id="sector-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="sector-modal-title">添加板块</h3>
                    <button class="close-btn" onclick="closeSectorModal()">&times;</button>
                </div>
                <form id="sector-form" onsubmit="saveSector(event)">
                    <div class="form-group">
                        <label>板块ID（英文拼音）</label>
                        <input type="text" id="sector-id" required placeholder="如：xinnengyuanqiche">
                    </div>
                    <div class="form-group">
                        <label>板块名称</label>
                        <input type="text" id="sector-name" required placeholder="如：新能源汽车">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>层级</label>
                            <select id="sector-level">
                                <option value="1">一级</option>
                                <option value="2">二级</option>
                                <option value="3">三级</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>父板块（可选）</label>
                            <select id="sector-parent">
                                <option value="">无（顶级板块）</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>体量</label>
                            <input type="number" id="sector-volume" value="50" min="1" max="200">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>日涨跌%</label>
                                <input type="number" id="sector-daily" value="0" step="0.1">
                            </div>
                            <div class="form-group">
                                <label>周涨跌%</label>
                                <input type="number" id="sector-week" value="0" step="0.1">
                            </div>
                            <div class="form-group">
                                <label>月涨跌%</label>
                                <input type="number" id="sector-month" value="0" step="0.1">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeSectorModal()">取消</button>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                </form>
            </div>
        </div>

        <!-- 关联表单弹窗 -->
        <div class="modal" id="relation-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="relation-modal-title">添加关联</h3>
                    <button class="close-btn" onclick="closeRelationModal()">&times;</button>
                </div>
                <form id="relation-form" onsubmit="saveRelation(event)">
                    <input type="hidden" id="relation-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label>源板块</label>
                            <select id="relation-source" required></select>
                        </div>
                        <div class="form-group">
                            <label>目标板块</label>
                            <select id="relation-target" required></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>关系类型</label>
                            <select id="relation-type">
                                <option value="供应">供应</option>
                                <option value="应用">应用</option>
                                <option value="配套">配套</option>
                                <option value="技术同源">技术同源</option>
                                <option value="成本影响">成本影响</option>
                                <option value="需求影响">需求影响</option>
                                <option value="替代">替代</option>
                                <option value="互补">互补</option>
                                <option value="竞争">竞争</option>
                                <option value="政策联动">政策联动</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>权重 (-10~10)</label>
                            <input type="number" id="relation-weight" value="5" min="-10" max="10">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeRelationModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <footer>
            <p>数据存储于浏览器本地 | V0.2 数据管理版</p>
        </footer>
    </div>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>

</html>
